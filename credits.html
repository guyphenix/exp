<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BBC Credits Checker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e12;
    --surface: #16161c;
    --surface2: #1e1e26;
    --border: #2a2a36;
    --text: #e8e8f0;
    --muted: #7070a0;
    --green: #00e87a;
    --green-bg: #001f10;
    --green-border: #00512a;
    --orange: #ff8c00;
    --orange-bg: #1a0e00;
    --orange-border: #5a3000;
    --red: #ff3c5a;
    --red-bg: #1a0008;
    --red-border: #5a0018;
    --accent: #4e7cff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Subtle grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(78,124,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(78,124,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 860px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }

  /* Header */
  header {
    margin-bottom: 48px;
  }

  .bbc-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 6px 12px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  .bbc-badge::before {
    content: '';
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }

  h1 {
    font-size: clamp(28px, 5vw, 44px);
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -0.02em;
    color: var(--text);
    margin-bottom: 12px;
  }

  h1 span {
    color: var(--accent);
  }

  .subtitle {
    color: var(--muted);
    font-size: 15px;
    font-weight: 400;
    line-height: 1.6;
    max-width: 520px;
  }

  /* Legend */
  .legend {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 32px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    letter-spacing: 0.06em;
  }

  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .dot-green { background: var(--green); box-shadow: 0 0 8px var(--green); }
  .dot-orange { background: var(--orange); box-shadow: 0 0 8px var(--orange); }
  .dot-red { background: var(--red); box-shadow: 0 0 8px var(--red); }

  /* Search */
  .search-wrapper {
    position: relative;
    margin-bottom: 8px;
  }

  .search-icon {
    position: absolute;
    left: 18px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    width: 18px;
    height: 18px;
    pointer-events: none;
  }

  #search {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 18px 18px 18px 50px;
    font-family: 'Syne', sans-serif;
    font-size: 17px;
    font-weight: 600;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    letter-spacing: -0.01em;
  }

  #search::placeholder { color: var(--muted); font-weight: 400; }

  #search:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(78,124,255,0.12);
  }

  .hint {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    padding: 6px 4px;
    letter-spacing: 0.06em;
  }

  /* Filter tabs */
  .filters {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .filter-btn {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 7px 14px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }

  .filter-btn:hover { border-color: var(--accent); color: var(--text); }

  .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  .filter-btn.active-green { background: var(--green); border-color: var(--green); color: #000; }
  .filter-btn.active-orange { background: var(--orange); border-color: var(--orange); color: #000; }
  .filter-btn.active-red { background: var(--red); border-color: var(--red); color: #fff; }

  /* Results */
  #results {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .result-card {
    background: var(--surface);
    border-radius: 8px;
    padding: 18px 20px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    animation: slideIn 0.2s ease both;
    position: relative;
    overflow: hidden;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .result-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    border-radius: 8px 0 0 8px;
  }

  .result-card.green { border: 1px solid var(--green-border); background: var(--green-bg); }
  .result-card.green::before { background: var(--green); }
  .result-card.orange { border: 1px solid var(--orange-border); background: var(--orange-bg); }
  .result-card.orange::before { background: var(--orange); }
  .result-card.red { border: 1px solid var(--red-border); background: var(--red-bg); }
  .result-card.red::before { background: var(--red); }

  .result-card:hover { transform: translateX(3px); }

  .card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 6px;
  }

  .credit-title {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: -0.01em;
    color: var(--text);
    flex: 1;
  }

  .status-badge {
    flex-shrink: 0;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 3px;
    font-weight: 500;
  }

  .green .status-badge { background: rgba(0,232,122,0.15); color: var(--green); border: 1px solid var(--green-border); }
  .orange .status-badge { background: rgba(255,140,0,0.15); color: var(--orange); border: 1px solid var(--orange-border); }
  .red .status-badge { background: rgba(255,60,90,0.15); color: var(--red); border: 1px solid var(--red-border); }

  .credit-category {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.06em;
    margin-bottom: 8px;
  }

  .credit-note {
    font-size: 13px;
    line-height: 1.6;
    color: #a0a0c0;
    display: none;
  }

  .result-card.expanded .credit-note { display: block; }

  .timing-row {
    display: flex;
    gap: 16px;
    margin-top: 10px;
    flex-wrap: wrap;
  }

  .timing-chip {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 3px 9px;
  }

  .expand-hint {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.06em;
    margin-top: 8px;
    opacity: 0.6;
  }

  .result-card.expanded .expand-hint { display: none; }

  /* Empty / welcome state */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }

  .empty-state .big-icon {
    font-size: 48px;
    margin-bottom: 16px;
    opacity: 0.4;
  }

  .empty-state h3 {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 8px;
    color: var(--text);
  }

  .empty-state p {
    font-size: 14px;
    line-height: 1.6;
    max-width: 360px;
    margin: 0 auto;
  }

  /* Section divider */
  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 4px 0 8px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 8px;
    margin-top: 16px;
  }

  .result-count {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    text-align: right;
    padding: 8px 0 16px;
    letter-spacing: 0.06em;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>

    <input type="text" id="search" placeholder="Type a credit title e.g. 'Executive Producer'…" autocomplete="off" autocorrect="off" spellcheck="false">

  <div class="filters" id="filters">

// State
let activeFilter = 'all';
let query = '';

function normalize(str) {
  return str.toLowerCase().replace(/[^a-z0-9\s]/g, '').trim();
}

function matches(credit, q) {
  if (!q) return true;
  const n = normalize(q);
  const fields = [credit.title, ...credit.aliases, credit.category].map(normalize);
  return fields.some(f => f.includes(n));
}

function render() {
  const container = document.getElementById('results');
  let filtered = CREDITS.filter(c => {
    const statusOk = activeFilter === 'all' || c.status === activeFilter;
    const queryOk = matches(c, query);
    return statusOk && queryOk;
  });

  if (!query && activeFilter === 'all') {
    container.innerHTML = `
      <div class="empty-state">
        <div class="big-icon">🎬</div>
        <h3>Search BBC credits</h3>
        <p>Type a credit title above to check whether it's approved, needs exec sign-off, or isn't permitted under BBC guidelines.</p>
      </div>`;
    return;
  }

  if (filtered.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="big-icon">🔍</div>
        <h3>No credits found</h3>
        <p>Try different wording, or check the BBC commissioning guidelines directly for specialist credits.</p>
      </div>`;
    return;
  }

  // Group by status for display
  const groups = [
    { key: 'green', label: '✓ Approved', items: filtered.filter(c => c.status === 'green') },
    { key: 'orange', label: '⚠ Exec Discretion Required', items: filtered.filter(c => c.status === 'orange') },
    { key: 'red', label: '✗ Not Permitted', items: filtered.filter(c => c.status === 'red') },
  ].filter(g => g.items.length > 0);

  const statusLabels = {
    green: 'Approved',
    orange: 'Exec Discretion',
    red: 'Not Permitted'
  };

  let html = `<div class="result-count">${filtered.length} credit${filtered.length !== 1 ? 's' : ''} found</div>`;

  for (const group of groups) {
    if (activeFilter === 'all') {
      html += `<div class="section-label">${group.label}</div>`;
    }
    for (const credit of group.items) {
      html += `
        <div class="result-card ${credit.status}" onclick="toggleCard(this)">
          <div class="card-top">
            <div class="credit-title">${credit.title}</div>
            <div class="status-badge">${statusLabels[credit.status]}</div>
          </div>
          <div class="credit-category">${credit.category}</div>
          <div class="credit-note">
            ${credit.note}
            <div class="timing-row">
              <div class="timing-chip">📍 ${credit.timing}</div>
              ${credit.aliases.length > 0 ? `<div class="timing-chip">Also: ${credit.aliases.join(', ')}</div>` : ''}
            </div>
          </div>
          <div class="expand-hint">↓ click for guidance notes</div>
        </div>`;
    }
  }

  container.innerHTML = html;
}

function toggleCard(el) {
  el.classList.toggle('expanded');
}

// Search input
document.getElementById('search').addEventListener('input', e => {
  query = e.target.value;
  render();
});

// Filter buttons
document.getElementById('filters').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  activeFilter = btn.dataset.filter;

  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.remove('active', 'active-green', 'active-orange', 'active-red');
  });

  if (activeFilter === 'all') btn.classList.add('active');
  else if (activeFilter === 'green') btn.classList.add('active-green');
  else if (activeFilter === 'orange') btn.classList.add('active-orange');
  else if (activeFilter === 'red') btn.classList.add('active-red');

  render();
});

// Initial render
render();
</script>
