<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CBeebies & CBBC — UK Production Ecosystem</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,600;1,300&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bbc-red:   #C0191A;
  --studio:    #1C6845;
  --postprod:  #6B38A0;
  --filming:   #A0720E;
  --bg:        #F4EFE6;
  --panel:     #FDFAF4;
  --ink:       #1C1610;
  --ink-mid:   #4A4035;
  --ink-light: #8A7D70;
  --border:    #DDD4C0;
  --hover:     #EDE6D6;
  --accent:    #C0191A;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink)}

/* ── HEADER ── */
.header{height:52px;background:var(--ink);display:flex;align-items:center;padding:0 20px;gap:14px;flex-shrink:0;position:relative;z-index:200}
.header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--bbc-red) 0%,#E85020 40%,#2C5F8A 100%)}
.bbc-pill{background:var(--bbc-red);color:#fff;font-family:'Fraunces',serif;font-weight:600;font-size:12px;letter-spacing:.08em;padding:3px 9px;border-radius:3px;flex-shrink:0}
.header-title{font-family:'Fraunces',serif;font-weight:300;font-size:17px;color:#fff;letter-spacing:.01em}
.header-title em{font-style:italic;color:#C0B8AC}
.header-spacer{flex:1}
.header-stat{font-size:11px;color:#786C60;letter-spacing:.06em;text-transform:uppercase}

/* ── LEGEND ── */
.legend-bar{height:40px;background:var(--panel);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:4px;flex-shrink:0;overflow-x:auto}
.legend-bar::-webkit-scrollbar{display:none}
.legend-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-light);font-weight:600;padding-right:8px;flex-shrink:0}
.leg{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--ink-mid);padding:4px 10px;border-radius:20px;border:1.5px solid transparent;cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0}
.leg:hover{background:var(--hover)}
.leg.on{border-color:var(--border);background:var(--hover);font-weight:600}
.leg-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}

/* ── MAIN SPLIT ── */
.split{display:flex;flex:1;overflow:hidden;height:calc(100vh - 92px)}

/* ── LEFT: MAP ── */
.map-side{flex:1;position:relative;min-width:0}
#map{width:100%;height:100%}

/* ── DETAIL DRAWER (over map) ── */
.drawer{position:absolute;bottom:0;left:0;right:0;background:var(--panel);border-top:1px solid var(--border);border-radius:14px 14px 0 0;box-shadow:0 -6px 28px rgba(0,0,0,.14);padding:16px 20px 24px;z-index:50;transform:translateY(100%);transition:transform .25s cubic-bezier(.4,0,.2,1);max-height:55%;overflow-y:auto}
.drawer.open{transform:translateY(0)}
.drawer-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 14px}
.drawer-inner{display:flex;gap:16px;align-items:flex-start}
.drawer-logo{width:72px;height:72px;border-radius:10px;border:1px solid var(--border);background:#fff;flex-shrink:0;display:flex;align-items:center;justify-content:center;overflow:hidden}
.drawer-logo img{width:100%;height:100%;object-fit:contain;padding:8px}
.drawer-body{flex:1;min-width:0}
.drawer-name{font-family:'Fraunces',serif;font-weight:300;font-size:20px;line-height:1.2;margin-bottom:3px}
.drawer-city{font-size:12px;color:var(--ink-light);margin-bottom:8px}
.drawer-shows-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-light);font-weight:600;margin-bottom:4px}
.drawer-shows{font-size:13px;color:var(--ink);line-height:1.55;margin-bottom:10px}
.drawer-link{font-size:12px;color:var(--accent);text-decoration:none;font-weight:500}
.drawer-link:hover{text-decoration:underline}
.drawer-close{position:absolute;top:16px;right:16px;width:28px;height:28px;border-radius:50%;border:1.5px solid var(--border);background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--ink-mid);line-height:1}
.drawer-close:hover{background:var(--hover)}

/* ── RIGHT: DIRECTORY ── */
.dir-side{width:50%;flex-shrink:0;background:var(--panel);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.dir-search{padding:10px 14px;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;gap:8px}
.dir-search svg{flex-shrink:0;color:var(--ink-light)}
.dir-search input{flex:1;border:none;background:none;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--ink);outline:none}
.dir-search input::placeholder{color:var(--ink-light)}

/* ── CARDS GRID ── */
.dir-grid{flex:1;overflow-y:auto;padding:10px;display:grid;grid-template-columns:1fr 1fr;gap:8px;align-content:start}
.dir-grid::-webkit-scrollbar{width:4px}
.dir-grid::-webkit-scrollbar-track{background:transparent}
.dir-grid::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

.card{background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:12px;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;gap:8px}
.card:hover{border-color:#C0B0A0;background:var(--hover);transform:translateY(-1px);box-shadow:0 3px 12px rgba(0,0,0,.07)}
.card.active{border-color:var(--accent);background:var(--hover);box-shadow:0 0 0 2px rgba(192,25,26,.12)}
.card-top{display:flex;align-items:flex-start;gap:10px}

.logo-wrap{width:48px;height:48px;border-radius:6px;border:1px solid var(--border);background:#fff;flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center}
.logo-wrap img{width:100%;height:100%;object-fit:contain;padding:5px}
.logo-initial{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-size:20px;font-weight:300;color:#fff}

.card-meta{flex:1;min-width:0}
.type-pip{display:inline-block;font-size:9px;text-transform:uppercase;letter-spacing:.07em;font-weight:600;padding:2px 5px;border-radius:3px;margin-bottom:4px}
.card-name{font-size:12px;font-weight:600;line-height:1.3;color:var(--ink)}
.card-city{font-size:11px;color:var(--ink-light);margin-top:2px}
.card-shows{font-size:11px;color:var(--ink-mid);line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

.empty-state{grid-column:1/-1;text-align:center;padding:40px 20px;color:var(--ink-light);font-size:13px}

/* ── RESPONSIVE ── */
@media(max-width:900px){
  .split{flex-direction:column}
  .map-side{height:45%;flex:none}
  .dir-side{width:100%;flex:1;border-left:none;border-top:1px solid var(--border)}
}
@media(max-width:600px){
  .dir-grid{grid-template-columns:1fr}
  .header-title{font-size:14px}
}
</style>
</head>
<body>

<header class="header">
  <div class="bbc-pill">BBC</div>
  <div class="header-title">UK Children's Television <em>Production Ecosystem</em></div>
  <div class="header-spacer"></div>
  <div class="header-stat" id="stat">18 locations</div>
</header>

<div class="legend-bar">
  <span class="legend-lbl">Show:</span>
  <div class="leg on" onclick="setFilter('all',this)"><span class="leg-dot" style="background:#888"></span>All</div>
  <div class="leg" onclick="setFilter('bbc',this)"><span class="leg-dot" style="background:#C0191A"></span>BBC Offices</div>
  <div class="leg" onclick="setFilter('studio',this)"><span class="leg-dot" style="background:#1C6845"></span>Indie Studios</div>
  <div class="leg" onclick="setFilter('postprod',this)"><span class="leg-dot" style="background:#6B38A0"></span>Animation &amp; Post</div>
  <div class="leg" onclick="setFilter('filming',this)"><span class="leg-dot" style="background:#A0720E"></span>Filming Facilities</div>
</div>

<div class="split">

  <!-- LEFT: MAP -->
  <div class="map-side">
    <div id="map"></div>
    <div class="drawer" id="drawer">
      <button class="drawer-close" onclick="closeDrawer()">×</button>
      <div class="drawer-handle"></div>
      <div class="drawer-inner">
        <div class="drawer-logo" id="d-logo"></div>
        <div class="drawer-body">
          <div id="d-type"></div>
          <div class="drawer-name" id="d-name"></div>
          <div class="drawer-city" id="d-city"></div>
          <div class="drawer-shows-lbl">Shows / Role</div>
          <div class="drawer-shows" id="d-shows"></div>
          <a class="drawer-link" id="d-link" href="#" target="_blank" rel="noopener"></a>
        </div>
      </div>
    </div>
  </div>

  <!-- RIGHT: DIRECTORY -->
  <div class="dir-side">
    <div class="dir-search">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="q" placeholder="Search studios, shows, cities…" oninput="applyFilters()">
    </div>
    <div class="dir-grid" id="grid"></div>
  </div>

</div>

<script>
const COLORS = { bbc:'#C0191A', studio:'#1C6845', postprod:'#6B38A0', filming:'#A0720E' };
const LABELS = { bbc:'BBC Office', studio:'Indie Studio', postprod:'Animation & Post', filming:'Filming Facility' };

const DATA = [
  { id:1,  type:'bbc',      name:"BBC Children's & Education — MediaCityUK", city:"Salford, Greater Manchester", lat:53.4727, lng:-2.2986,
    logo:"https://upload.wikimedia.org/wikipedia/commons/thumb/e/eb/BBC_CBeebies.svg/200px-BBC_CBeebies.svg.png",
    shows:"BBC Children's & Education commissioning HQ. CBeebies and CBBC commissioning, development and editorial teams based here since 2011.",
    web:"https://www.bbc.co.uk/cbbc" },
  { id:2,  type:'bbc',      name:"BBC Broadcasting House", city:"London W1A", lat:51.5189, lng:-0.1439,
    logo:"https://upload.wikimedia.org/wikipedia/commons/thumb/6/62/BBC_logo_%282021%29.svg/200px-BBC_logo_%282021%29.svg.png",
    shows:"BBC HQ. BBC Studios Kids & Family Productions (London). Senior BBC leadership and commissioning strategy.",
    web:"https://www.bbc.co.uk" },
  { id:3,  type:'bbc',      name:"BBC Scotland — Pacific Quay", city:"Glasgow", lat:55.858, lng:-4.2912,
    logo:"https://upload.wikimedia.org/wikipedia/commons/thumb/6/62/BBC_logo_%282021%29.svg/200px-BBC_logo_%282021%29.svg.png",
    shows:"BBC Scotland regional hub. Filming base for CBeebies shows including Playtime Towers and Waterloo Road (CBBC).",
    web:"https://www.bbc.co.uk/scotland" },
  { id:4,  type:'bbc',      name:"BBC Northern Ireland — Ormeau Avenue", city:"Belfast", lat:54.5933, lng:-5.9307,
    logo:"https://upload.wikimedia.org/wikipedia/commons/thumb/6/62/BBC_logo_%282021%29.svg/200px-BBC_logo_%282021%29.svg.png",
    shows:"BBC NI regional commissioning. Co-produced Sesame Tree with Sixteen South. Regional champion for NI productions.",
    web:"https://www.bbc.co.uk/northernireland" },
  { id:5,  type:'filming',  name:"BBC Roath Lock — Cardiff Bay", city:"Cardiff, Wales", lat:51.4618, lng:-3.1566,
    logo:"https://upload.wikimedia.org/wikipedia/commons/thumb/6/62/BBC_logo_%282021%29.svg/200px-BBC_logo_%282021%29.svg.png",
    shows:"BBC Cymru Wales drama village. BBC One and CBBC drama filming. Co-production base for Welsh and S4C partnerships.",
    web:"https://www.bbc.co.uk/wales" },
  { id:6,  type:'filming',  name:"dock10 Studios — MediaCityUK", city:"Salford, Greater Manchester", lat:53.4725, lng:-2.2989,
    logo:"https://www.dock10.co.uk/wp-content/themes/dock10/images/dock10-logo.svg",
    shows:"Largest studio complex outside London. Swashbuckle, Justin's House, Saturday Mash-Up!, Blue Peter, The Furchester Hotel.",
    web:"https://www.dock10.co.uk" },
  { id:7,  type:'postprod', name:"Aardman Animations", city:"Bristol", lat:51.4474, lng:-2.6078,
    logo:"https://upload.wikimedia.org/wikipedia/commons/thumb/8/81/Aardman_Logo.svg/200px-Aardman_Logo.svg.png",
    shows:"Shaun the Sheep (CBBC/BBC One), Morph (CBBC), Creature Comforts. Multi-Academy Award & BAFTA-winning stop-motion studio. Founded 1976.",
    web:"https://www.aardman.com" },
  { id:8,  type:'studio',   name:"A Productions", city:"Bristol", lat:51.455, lng:-2.5979,
    logo:"https://www.aproductions.co.uk/wp-content/uploads/2019/08/a-productions-logo.png",
    shows:"JoJo & Gran Gran (CBeebies), Love Monster (CBeebies, with Karrot), My Friend Maisy (in production).",
    web:"https://www.aproductions.co.uk" },
  { id:9,  type:'studio',   name:"Ragdoll Productions", city:"Stratford-upon-Avon", lat:52.2038, lng:-1.729,
    logo:"https://upload.wikimedia.org/wikipedia/en/thumb/f/f7/Ragdoll_logo.svg/200px-Ragdoll_logo.svg.png",
    shows:"Teletubbies, In the Night Garden, Twirlywoos, Abney & Teal (all CBeebies). Founded 1984 by Anne Wood. Legendary preschool IP house.",
    web:"https://www.ragdoll.co.uk" },
  { id:10, type:'postprod', name:"Mackinnon & Saunders", city:"Altrincham, Greater Manchester", lat:53.3937, lng:-2.3722,
    logo:"https://www.mackinnonandsaunders.com/wp-content/uploads/2020/01/logo-final.png",
    shows:"Moon & Me (CBeebies), Pinocchio. World-class puppet fabrication and stop-motion production studio.",
    web:"https://www.mackinnonandsaunders.com" },
  { id:11, type:'studio',   name:"Cloth Cat Animation", city:"Cardiff, Wales", lat:51.4832, lng:-3.1746,
    logo:"https://www.clothcat.com/wp-content/uploads/2019/09/Cloth-Cat-Logo-Web.png",
    shows:"Olobob Top (CBeebies), Shane the Chef (CBeebies), Grandpa in My Pocket (CBeebies), Boj (CBeebies). Wales' largest animation studio.",
    web:"https://www.clothcat.com" },
  { id:12, type:'studio',   name:"Maramedia", city:"Glasgow, Scotland", lat:55.8567, lng:-4.3003,
    logo:"https://maramedia.co.uk/wp-content/uploads/2020/10/maramedia-logo.png",
    shows:"Olga da Polga (CBeebies), wildlife and factual content for BBC. Scotland's leading children's and natural history indie.",
    web:"https://maramedia.co.uk" },
  { id:13, type:'studio',   name:"Sixteen South", city:"Holywood, Belfast", lat:54.641, lng:-5.8337,
    logo:"https://sixteensouth.tv/wp-content/themes/ss-new/img/sixteen-south-logo.png",
    shows:"Claude (CBeebies), Lily's Driftwood Bay, Big and Small, Sesame Tree (BBC NI), Big City Park, WildWoods, Odo. BAFTA Indie of the Year 2016.",
    web:"https://sixteensouth.tv" },
  { id:14, type:'studio',   name:"Paper Owl Films", city:"Sydenham, Belfast", lat:54.6315, lng:-5.8671,
    logo:"https://www.paperowlfilms.com/wp-content/uploads/2020/03/paper-owl-films-logo.png",
    shows:"Pablo (CBeebies), Happy the Hoglet (CBeebies), Ladybird & Bee. Pioneering neurodiverse content studio.",
    web:"https://www.paperowlfilms.com" },
  { id:15, type:'studio',   name:"JAM Media", city:"Belfast", lat:54.5936, lng:-5.9371,
    logo:"https://jammedia.com/wp-content/themes/jam-media/assets/img/jam-media-logo.svg",
    shows:"Beddybyes (CBeebies, in production), Nova Jones S2 (CBBC), Roy (CBBC), Becca's Bunch. Belfast & Dublin operations.",
    web:"https://jammedia.com" },
  { id:16, type:'postprod', name:"Blue Zoo Animation Studio", city:"Camden, London", lat:51.5389, lng:-0.1434,
    logo:"https://www.blue-zoo.co.uk/wp-content/themes/bluezoo/assets/img/logo.svg",
    shows:"Numberblocks (CBeebies), Alphablocks (CBeebies), Colourblocks, Adventures of Paddington, Mojo Swoptops. 200+ artists.",
    web:"https://www.blue-zoo.co.uk" },
  { id:17, type:'studio',   name:"Karrot Entertainment", city:"Elephant & Castle, London", lat:51.49, lng:-0.0929,
    logo:"https://wearekarrot.com/wp-content/themes/karrot/img/karrot-logo.png",
    shows:"Sarah & Duck (CBeebies), Love Monster (CBeebies), My Friend Maisy (in production). BAFTA & Emmy-winning studio.",
    web:"https://wearekarrot.com" },
  { id:18, type:'postprod', name:"Lupus Films", city:"Islington, London", lat:51.5352, lng:-0.1038,
    logo:"https://www.lupusfilms.com/assets/img/lupus-logo.png",
    shows:"We're Going on a Bear Hunt (BBC), The Tiger Who Came to Tea (Channel 4/BBC), Kensuke's Kingdom. Specialist hand-drawn 2D animation.",
    web:"https://www.lupusfilms.com" }
];

let map, markers = [], activeFilter = 'all', activeId = null;

function mkImg(src, color, init) {
  const img = document.createElement('img');
  img.src = src;
  img.alt = '';
  img.onerror = () => {
    const d = document.createElement('div');
    d.className = 'logo-initial';
    d.style.background = color;
    d.textContent = init;
    img.replaceWith(d);
  };
  return img;
}

function buildCards(list) {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  document.getElementById('stat').textContent = list.length + ' location' + (list.length !== 1 ? 's' : '');
  if (!list.length) {
    grid.innerHTML = '<div class="empty-state">No matching locations found.</div>';
    return;
  }
  list.forEach(loc => {
    const c = COLORS[loc.type];
    const card = document.createElement('div');
    card.className = 'card' + (activeId === loc.id ? ' active' : '');
    card.id = 'card-' + loc.id;
    card.onclick = () => selectLoc(loc);

    const logoWrap = document.createElement('div');
    logoWrap.className = 'logo-wrap';
    logoWrap.appendChild(mkImg(loc.logo, c, loc.name[0]));

    const meta = document.createElement('div');
    meta.className = 'card-meta';
    meta.innerHTML = `<span class="type-pip" style="background:${c}1A;color:${c};border:1px solid ${c}44">${LABELS[loc.type]}</span>
      <div class="card-name">${loc.name}</div>
      <div class="card-city">${loc.city}</div>`;

    const top = document.createElement('div');
    top.className = 'card-top';
    top.appendChild(logoWrap);
    top.appendChild(meta);

    const shows = document.createElement('div');
    shows.className = 'card-shows';
    shows.textContent = loc.shows;

    card.appendChild(top);
    card.appendChild(shows);
    grid.appendChild(card);
  });
}

function selectLoc(loc) {
  if (activeId) {
    const prev = document.getElementById('card-' + activeId);
    if (prev) prev.classList.remove('active');
  }
  activeId = loc.id;
  const card = document.getElementById('card-' + loc.id);
  if (card) { card.classList.add('active'); card.scrollIntoView({ behavior:'smooth', block:'nearest' }); }

  if (map) { map.panTo({ lat:loc.lat, lng:loc.lng }); if (map.getZoom() < 9) map.setZoom(9); }

  const c = COLORS[loc.type];
  const dLogo = document.getElementById('d-logo');
  dLogo.innerHTML = '';
  dLogo.appendChild(mkImg(loc.logo, c, loc.name[0]));

  document.getElementById('d-type').innerHTML =
    `<span class="type-pip" style="background:${c}1A;color:${c};border:1px solid ${c}44;font-size:10px;text-transform:uppercase;letter-spacing:.07em;font-weight:600;padding:2px 6px;border-radius:3px;display:inline-block;margin-bottom:6px">${LABELS[loc.type]}</span>`;
  document.getElementById('d-name').textContent = loc.name;
  document.getElementById('d-city').textContent = '📍 ' + loc.city;
  document.getElementById('d-shows').textContent = loc.shows;
  const lnk = document.getElementById('d-link');
  lnk.href = loc.web;
  lnk.textContent = '→ ' + loc.web.replace(/^https?:\/\//,'');
  document.getElementById('drawer').classList.add('open');
}

function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  if (activeId) {
    const prev = document.getElementById('card-' + activeId);
    if (prev) prev.classList.remove('active');
    activeId = null;
  }
}

function setFilter(type, el) {
  document.querySelectorAll('.leg').forEach(l => l.classList.remove('on'));
  el.classList.add('on');
  activeFilter = type;
  applyFilters();
}

function applyFilters() {
  const q = document.getElementById('q').value.toLowerCase().trim();
  const visible = DATA.filter(loc => {
    const typeOk = activeFilter === 'all' || loc.type === activeFilter;
    const textOk = !q || [loc.name, loc.city, loc.shows].some(s => s.toLowerCase().includes(q));
    return typeOk && textOk;
  });
  buildCards(visible);
  markers.forEach(m => m.setVisible(!!visible.find(l => l.id === m._id)));
}

function initMap() {
  map = new google.maps.Map(document.getElementById('map'), {
    center:{ lat:54.2, lng:-2.8 }, zoom:6,
    mapTypeControl:false, streetViewControl:false, fullscreenControl:false,
    zoomControlOptions:{ position:google.maps.ControlPosition.RIGHT_BOTTOM },
    styles:[
      { elementType:'geometry',           stylers:[{color:'#EAE5D8'}] },
      { elementType:'labels.text.fill',   stylers:[{color:'#3A2E24'}] },
      { elementType:'labels.text.stroke', stylers:[{color:'#F4EFE6'}] },
      { featureType:'road',         elementType:'geometry',         stylers:[{color:'#D4CCB8'}] },
      { featureType:'road.highway', elementType:'geometry',         stylers:[{color:'#C8BDA8'}] },
      { featureType:'road',         elementType:'labels.text.fill', stylers:[{color:'#8A7D6A'}] },
      { featureType:'water',        elementType:'geometry',         stylers:[{color:'#9BBEC8'}] },
      { featureType:'water',        elementType:'labels.text.fill', stylers:[{color:'#5A8A9A'}] },
      { featureType:'poi',          stylers:[{visibility:'off'}] },
      { featureType:'transit',      stylers:[{visibility:'off'}] },
      { featureType:'administrative.country',  elementType:'geometry.stroke', stylers:[{color:'#A89A84'}] },
      { featureType:'administrative.province', elementType:'geometry.stroke', stylers:[{color:'#C0B098'}] }
    ]
  });

  DATA.forEach(loc => {
    const c = COLORS[loc.type];
    const svg = encodeURIComponent(
      `<svg xmlns="http://www.w3.org/2000/svg" width="28" height="36" viewBox="0 0 28 36">` +
      `<path d="M14 2C8.5 2 4 6.5 4 12c0 7.5 10 22 10 22S24 19.5 24 12c0-5.5-4.5-10-10-10z" fill="${c}" stroke="white" stroke-width="1.5"/>` +
      `<circle cx="14" cy="12" r="4.5" fill="white" opacity="0.92"/></svg>`
    );
    const marker = new google.maps.Marker({
      position:{ lat:loc.lat, lng:loc.lng }, map,
      title:loc.name,
      icon:{ url:'data:image/svg+xml;charset=UTF-8,'+svg, scaledSize:new google.maps.Size(28,36), anchor:new google.maps.Point(14,36) }
    });
    marker._id = loc.id;
    marker.addListener('click', () => selectLoc(loc));
    markers.push(marker);
  });
}

window.initMap = initMap;
buildCards(DATA);
</script>
